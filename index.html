    border-radius: 50%;

  .wave:nth-child(2) { animation-delay: -2s; opacity: 0.5; background: rgba(46, 109, 164, 0.2); }
  .wave:nth-child(3) { animation-delay: -4s; opacity: 0.3; }

  @keyframes waveFlow {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .om-float {

    font-size: 8rem;
    color: rgba(200, 150, 12, 0.08);

  .om-float:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .om-float:nth-child(2) { top: 20%; right: 8%; animation-delay: -3s; font-size: 5rem; }
  .om-float:nth-child(3) { bottom: 25%; left: 15%; animation-delay: -5s; font-size: 6rem; }
